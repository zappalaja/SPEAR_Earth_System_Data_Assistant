version: '3.8'

services:
  spear:
    build:
      context: .
      dockerfile: Containerfile.slim
    container_name: spear-chatbot
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - AUTH_ENABLED=true
      - PERSIST_CONVERSATIONS=true
    volumes:
      - ./data/chroma_db:/app/chroma_db
      - ./data/nougat_merged_md:/app/nougat_merged_md
      - ./data/users.yaml:/app/chatbot/users.yaml
      - ./data/chat_logs:/app/chatbot/chat_logs
    expose:
      - "8501"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - spear
    networks:
      - internal

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"

networks:
  internal:
    driver: bridge
