# SPEAR Earth System Data Assistant — Unified Conda Environment
#
# This single environment contains ALL dependencies for the chatbot,
# MCP server, and RAG service. Just install and run.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate spear
#
name: spear
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - pip
  - pip:
      # ── Shared / cross-component ──────────────────────────────
      - numpy>=2.2.6
      - xarray>=2025.6.1
      - aiohttp>=3.12.13
      - matplotlib>=3.10.5
      - h5netcdf>=1.6.4
      - netCDF4>=1.7.2
      - Pillow>=11.3.0
      - s3fs>=2024.12.0
      - fsspec>=2024.12.0
      - pydantic>=2.11.7

      # ── Chatbot ───────────────────────────────────────────────
      - streamlit==1.40.2
      - python-dotenv>=1.0.1
      - boto3>=1.35.86
      - PyPDF2>=3.0.1
      - httpx>=0.27.2
      - mcp>=1.13.0
      - anthropic>=0.39.0
      - google-generativeai>=0.8.0
      - streamlit-authenticator>=0.3.0
      - PyYAML>=6.0
      - bcrypt>=4.0.0

      # ── MCP Server ────────────────────────────────────────────
      - aiofiles>=24.1.0
      - async-lru>=2.0.5
      - beautifulsoup4>=4.12.0
      - cartopy>=0.25.0
      - cftime>=1.6.4.post1
      - fastmcp>=2.10.1
      - loguru>=0.7.3
      - pydap>=3.5.5
      - dask>=2025.12.0
      - zarr>=2.18.0

      # ── Ingestion support (merge script needs pypdf) ───────────
      - pypdf>=6.0.0

      # NOTE: nougat-ocr requires an older transformers version that
      # conflicts with sentence-transformers. Nougat OCR runs in its
      # own conda env ("nougat"). Create it with:
      #   conda env create -f rag-service/ingestion/envs/nougat.yml
      # This is only needed if you want to ingest new PDFs.

      # ── RAG Service ───────────────────────────────────────────
      - fastapi>=0.100.0
      - uvicorn[standard]>=0.23.0
      - langchain-chroma>=0.1.0
      - langchain-community>=0.4.0
      - langchain-huggingface>=0.0.1
      - sentence-transformers>=2.2.0
      - chromadb>=0.4.0
      - python-multipart>=0.0.6
